<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Steps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #333333; }
        .mincho { font-family: 'Noto Serif JP', serif; }
        .gothic { font-family: sans-serif; }
        .fade-in { animation: fadeIn 1s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* AdSenseの枠用（画像に合わせて灰色に） */
        .adsbygoogle-placeholder {
            background-color: #f5f5f5;
            border: 1px solid #eeeeee;
        }
    </style>
    </head>
<body class="min-h-screen flex flex-col items-center gothic">

    <main class="w-full max-w-xl mt-24 px-6 flex flex-col items-center">
        <textarea id="userInput" class="gothic w-full h-40 text-lg border border-gray-100 p-4 focus:ring-0 resize-none placeholder-gray-300" 
            placeholder="今日一日の出来事を記載してください..."></textarea>
        
        <button onclick="sendAction()" id="sendBtn" class="gothic mt-6 px-12 py-2 text-sm bg-black text-white hover:bg-gray-800 transition">
            刻む
        </button>
    </main>

    <section id="result" class="w-full max-w-xl mt-32 px-6 hidden">
        
        <h2 id="quote" class="mincho text-3xl md:text-4xl leading-relaxed text-gray-900 mb-2 font-medium"></h2>
        
        <p id="author" class="mincho text-[11px] text-gray-400 mb-12 tracking-widest pl-1"></p>
        
        <p id="comment" class="mincho text-sm text-gray-600 leading-loose mb-16"></p>

        <div class="w-full mb-12 flex justify-center">
            <div class="adsbygoogle-placeholder w-full h-40 flex items-center justify-center border border-dashed border-gray-300">
                <span class="text-3xl text-gray-300 gothic font-bold">広告</span>
            </div>
        </div>
    </section>

    <footer class="mt-auto w-full max-w-lg h-16 border-t border-gray-100 flex items-center justify-center">
        <span class="gothic text-[10px] text-gray-300 tracking-tighter text-center">ADVERTISEMENT</span>
    </footer>

    <script>
        async function sendAction() {
            const text = document.getElementById('userInput').value;
            if(!text) return;

            const btn = document.getElementById('sendBtn');
            const resultDiv = document.getElementById('result');
            btn.disabled = true;
            btn.innerText = "...";

            try {
                // ここはご自身のWorkers URLのままにしてください
                const res = await fetch('https://makeyourdreem.takahara-design.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: `${text}\n※回答は必ず日本語の名言を引用してください。`
                    })
                });
                const data = await res.json();

                if (data.quote) {
                    document.getElementById('quote').innerText = `『${data.quote}』`;
                    document.getElementById('author').innerText = data.author;
                    document.getElementById('comment').innerText = data.comment;
                    
                    resultDiv.classList.remove('hidden');
                    resultDiv.classList.add('fade-in');

                    // 広告枠のサイズを自動調整する場合（AdSenseが動作した時）
                    // (window.adsbygoogle = window.adsbygoogle || []).push({});
                } else {
                    throw new Error("Invalid response format");
                }
            } catch (e) {
                alert("賢者は今、瞑想中のようです。");
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "刻む";
            }
        }
    </script>
</body>
</html>
