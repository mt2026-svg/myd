<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Steps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7842538127368354" crossorigin="anonymous"></script>

    <style>
        body { background-color: #ffffff; color: #333333; overflow-x: hidden; }
        .mincho { font-family: 'Noto Serif JP', serif; }
        .gothic { font-family: sans-serif; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
        .loading-dots { animation: pulse 1.5s infinite; }

        .char {
            display: inline-block;
            opacity: 0;
            transform: translateY(10px);
            animation: charFade 0.8s ease forwards;
        }
        @keyframes charFade { to { opacity: 1; transform: translateY(0); } }

        /* 究極の改行制御 */
        .pretty-wrap {
            display: inline-block;
            text-align: center;
            line-break: strict;
            word-break: keep-all; /* 単語の途中での改行を極力防ぐ */
            overflow-wrap: break-word;
            padding: 0 1rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center gothic">

    <main class="w-full max-w-xl px-6 flex flex-col">
        <div id="todayDate" class="mt-20 mb-2 text-[10px] text-gray-400 tracking-widest pl-4"></div>
        <textarea id="userInput" maxlength="1000" class="gothic w-full h-40 text-lg border-none p-4 focus:ring-0 resize-none placeholder-gray-300 transition-colors duration-500" 
            placeholder="今日一日の出来事を記載してください..."></textarea>
        
        <div class="flex justify-center mt-6">
            <button onclick="sendAction()" id="sendBtn" class="gothic w-40 py-2 text-sm bg-black text-white hover:bg-gray-800 transition flex justify-center items-center">
                <span id="btnText">刻む</span>
            </button>
        </div>
    </main>

    <section id="result" class="w-full max-w-4xl px-4 hidden flex-col">
        <div class="flex flex-col items-center text-center mt-32 mb-10">
            <h2 id="quote" class="mincho text-5xl md:text-7xl leading-[1.6] text-gray-900 mb-12 font-bold pretty-wrap"></h2>
            
            <p id="authorContainer" class="mincho text-xs text-gray-400 tracking-widest cursor-pointer hover:text-gray-600 transition underline decoration-gray-200 underline-offset-4">
                <span id="author"></span>
            </p>
        </div>

        <div class="flex flex-col items-center text-center mb-24 px-6">
            <p id="comment" class="mincho text-sm text-gray-500 leading-loose max-w-md opacity-0 transition-opacity duration-1000"></p>
        </div>
        
        <div id="ad-container" class="w-full mb-12 flex justify-center opacity-0">
            <ins class="adsbygoogle"
                 style="display:block;width:100%;min-height:150px;" 
                 data-ad-client="ca-pub-7842538127368354"
                 data-ad-slot="8651453819"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </section>

    <footer class="mt-auto w-full h-16 flex items-center justify-center">
        <span class="gothic text-[10px] text-gray-300 tracking-tighter">ADVERTISEMENT</span>
    </footer>

    <script>
        const now = new Date();
        const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
        document.getElementById('todayDate').innerText = dateStr;

        (window.adsbygoogle = window.adsbygoogle || []).push({});

        async function sendAction() {
            const text = document.getElementById('userInput').value;
            if(!text) return;

            const btn = document.getElementById('sendBtn');
            const btnText = document.getElementById('btnText');
            const inputArea = document.getElementById('userInput');
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-dots">・・・</span>';
            inputArea.classList.add('bg-gray-50');

            try {
                const res = await fetch('https://makeyourdreem.takahara-design.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: `${text}\n※回答は必ず日本語の名言を引用してください。` })
                });
                const data = await res.json();

                if (data.quote) {
                    const quoteElem = document.getElementById('quote');
                    quoteElem.innerHTML = '';
                    
                    const fullText = `『${data.quote}』`;
                    
                    // 改行を調整するための特別な処理
                    // 句読点などを前の文字とグループ化してspanに入れる
                    const regex = /.[、。』」]?/g;
                    const segments = fullText.match(regex) || [];
                    
                    segments.forEach((seg, i) => {
                        const span = document.createElement('span');
                        span.innerText = seg;
                        span.className = 'char';
                        span.style.animationDelay = `${i * 0.15}s`; // 少しゆっくり出す
                        quoteElem.appendChild(span);
                    });

                    document.getElementById('author').innerText = data.author;
                    document.getElementById('authorContainer').onclick = () => {
                        window.open(`https://www.google.com/search?q=${encodeURIComponent(data.author)}`, '_blank');
                    };

                    const commentElem = document.getElementById('comment');
                    commentElem.innerText = data.comment;
                    commentElem.classList.remove('opacity-0');

                    resultDiv.classList.remove('hidden');
                    resultDiv.classList.add('flex');
                    document.getElementById('ad-container').classList.remove('opacity-0');
                    
                    setTimeout(() => {
                        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 500);
                }
            } catch (e) {
                alert("通信に失敗しました。");
                inputArea.classList.remove('bg-gray-50');
            } finally {
                btn.disabled = false;
                btnText.innerText = "刻む";
            }
        }
    </script>
</body>
</html>
