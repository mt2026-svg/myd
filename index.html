<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Steps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7842538127368354" crossorigin="anonymous"></script>

    <style>
        body { background-color: #ffffff; color: #333333; }
        .mincho { font-family: 'Noto Serif JP', serif; }
        .gothic { font-family: sans-serif; }
        .fade-in { animation: fadeIn 1s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center gothic">

    <main class="w-full max-w-xl px-6 flex flex-col items-center">
        <textarea id="userInput" class="gothic w-full h-40 text-lg border-none p-4 mt-20 focus:ring-0 resize-none placeholder-gray-300" 
            placeholder="今日一日の出来事を記載してください..."></textarea>
        
        <button onclick="sendAction()" id="sendBtn" class="gothic w-40 py-2 text-sm bg-black text-white hover:bg-gray-800 transition">
            刻む
        </button>
    </main>

    <section id="result" class="w-full max-w-xl px-6 hidden flex-col">
        
        <div class="flex flex-col items-center text-center mt-24 mb-10">
            <h2 id="quote" class="mincho text-4xl md:text-5xl leading-tight text-gray-900 mb-6 font-bold px-4 tracking-tighter"></h2>
            <p id="author" class="mincho text-xs text-gray-400 tracking-widest"></p>
        </div>

        <div class="flex flex-col items-center text-center mb-20 px-4">
            <p id="comment" class="mincho text-sm text-gray-600 leading-loose max-w-md"></p>
        </div>
        
        <div class="w-full mb-12 flex justify-center">
            <ins class="adsbygoogle"
                 style="display:block;width:100%;height:150px;" 
                 data-ad-client="ca-pub-7842538127368354"
                 data-ad-slot="8651453819"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </section>

    <footer class="mt-auto w-full max-w-lg h-16 flex items-center justify-center">
        <span class="gothic text-[10px] text-gray-300 tracking-tighter text-center">ADVERTISEMENT</span>
    </footer>

    <script>
        async function sendAction() {
            const text = document.getElementById('userInput').value;
            if(!text) return;

            const btn = document.getElementById('sendBtn');
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btn.innerText = "...";

            try {
                const res = await fetch('https://makeyourdreem.takahara-design.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: `${text}\n※回答は必ず日本語の名言を引用してください。`
                    })
                });
                const data = await res.json();

                if (data.quote) {
                    // 画面にデータを流し込む
                    document.getElementById('quote').innerText = `『${data.quote}』`;
                    document.getElementById('author').innerText = data.author;
                    document.getElementById('comment').innerText = data.comment; // コメントを反映
                    
                    resultDiv.classList.remove('hidden');
                    resultDiv.classList.add('flex', 'fade-in');
                    
                    // スムーズに結果画面へスクロール
                    setTimeout(() => {
                        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                }
            } catch (e) {
                alert("賢者は今、瞑想中のようです。");
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "刻む";
            }
        }
    </script>
</body>
</html>
